<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gainsay</title>
<style>
  :root{
    --ink:#15162B; --ink2:#3A3B57; --muted:#6E6F86; --line:#E7E6EE; --line2:#D7D6E2;
    --bg:#FAF9FC; --card:#FFFFFF; --indigo:#4F46E5; --indigobg:#EEF0FE;
    --web:#1D6FB8; --webbg:#E7F1FA; --book:#9A6B1E; --bookbg:#FBF1DE;
    --sch:#0E7490; --schbg:#E0F2F7;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:system-ui,'Segoe UI',sans-serif;color:var(--ink);background:var(--bg);
       -webkit-font-smoothing:antialiased;line-height:1.6}
  a{color:inherit}
  .wrap{max-width:880px;margin:0 auto;padding:0 22px}
  svg{width:1em;height:1em;vertical-align:-0.13em;fill:none;stroke:currentColor;stroke-width:2;
      stroke-linecap:round;stroke-linejoin:round}

  /* header (compact, after a search) */
  .top{position:sticky;top:0;background:rgba(250,249,252,.92);backdrop-filter:blur(6px);
       border-bottom:.5px solid var(--line);z-index:5;display:none}
  .top .wrap{display:flex;align-items:center;gap:14px;height:60px}
  .brand{font-weight:600;font-size:17px;letter-spacing:.2px;white-space:nowrap;display:flex;align-items:center;gap:8px}
  .brand .lens{color:var(--indigo)}
  .top .bar{flex:1}

  /* hero (before first search) */
  .hero{min-height:62vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .hero h1{font-size:34px;font-weight:600;margin:0 0 6px;letter-spacing:.3px}
  .hero h1 .lens{color:var(--indigo)}
  .hero p{color:var(--muted);margin:0 0 26px;font-size:15px}

  /* search bar */
  .bar{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line2);
       border-radius:14px;padding:10px 12px 10px 16px;box-shadow:0 1px 2px rgba(20,22,43,.04)}
  .bar:focus-within{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigobg)}
  .bar .mag{color:var(--muted);font-size:18px;flex:none}
  .bar input{flex:1;min-width:0;border:none;outline:none;background:none;font:inherit;font-size:15px;color:var(--ink)}
  .bar input::placeholder{color:#9b9cb0}
  .bar button.go{flex:none;background:var(--indigo);color:#fff;border:none;border-radius:10px;
       padding:9px 16px;font:inherit;font-weight:500;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:7px}
  .bar button.go:disabled{opacity:.55;cursor:default}

  .opts{display:flex;align-items:center;gap:16px;justify-content:center;margin-top:14px;font-size:13px;color:var(--muted);flex-wrap:wrap}
  .opt{display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
  .sw{width:34px;height:19px;border-radius:999px;background:var(--line2);position:relative;transition:.15s;flex:none}
  .sw.on{background:var(--indigo)}
  .sw i{position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:.15s}
  .sw.on i{left:17px}
  .num{display:inline-flex;align-items:center;gap:6px}
  .num input{width:46px;border:1px solid var(--line2);border-radius:8px;padding:4px 6px;font:inherit;font-size:13px;text-align:center}
  .egs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:22px}
  .eg{font-size:12.5px;color:var(--ink2);background:var(--card);border:1px solid var(--line);border-radius:999px;
      padding:6px 13px;cursor:pointer}
  .eg:hover{border-color:var(--indigo);color:var(--indigo)}

  /* results */
  .results{padding:24px 0 60px;display:none}
  .qline{font-size:20px;font-weight:600;margin:6px 0 18px;display:flex;align-items:flex-start;gap:10px}
  .qline .qi{color:var(--indigo);font-size:20px;flex:none;margin-top:2px}

  .loading{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:14px;padding:18px 0}
  .spin{width:18px;height:18px;border:2px solid var(--line2);border-top-color:var(--indigo);border-radius:50%;
        animation:sp 0.7s linear infinite;flex:none}
  @keyframes sp{to{transform:rotate(360deg)}}
  .steps{font-size:12.5px;color:var(--muted)}

  .answer{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:22px}
  .answer .lbl{font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);
       display:flex;align-items:center;gap:7px;margin-bottom:12px}
  .answer .lbl .dot{width:6px;height:6px;border-radius:50%;background:#2BB673}
  .answer .lbl{justify-content:flex-start}
  .answer .body{font-size:15.5px;color:var(--ink);white-space:pre-wrap;word-wrap:break-word}
  .cursor{display:inline-block;width:7px;height:1.05em;background:var(--indigo);vertical-align:-2px;margin-left:1px;border-radius:1px;animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}
  .answer .body .srchead{font-weight:600;margin-top:14px;display:block}
  .cite{font-size:12px;font-weight:600;padding:1px 6px;border-radius:6px;text-decoration:none;vertical-align:1px;margin:0 1px;white-space:nowrap}
  .cite-W{background:var(--webbg);color:var(--web)} .cite-B{background:var(--bookbg);color:var(--book)}
  .cite-S{background:var(--schbg);color:var(--sch)}

  .seccol{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:680px){.seccol{grid-template-columns:1fr}}
  .sec h3{font-size:13px;font-weight:600;color:var(--ink2);margin:0 0 11px;display:flex;align-items:center;gap:8px}
  .sec h3 .tag{font-size:11px;font-weight:600;padding:1px 7px;border-radius:6px}
  .tag.web{background:var(--webbg);color:var(--web)} .tag.book{background:var(--bookbg);color:var(--book)}
  .tag.sch{background:var(--schbg);color:var(--sch)}
  .schsec{margin-top:18px}
  .src{display:block;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:10px;text-decoration:none}
  .src:hover{border-color:var(--line2)}
  .src.hl{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigobg)}
  .src .id{font-size:11px;font-weight:600;padding:1px 6px;border-radius:6px;margin-right:7px}
  .src .id.w{background:var(--webbg);color:var(--web)} .src .id.b{background:var(--bookbg);color:var(--book)}
  .src .id.s{background:var(--schbg);color:var(--sch)}
  .src .t{font-size:14px;font-weight:500;color:var(--ink);display:inline}
  .src .dom{font-size:12px;color:var(--web);margin:5px 0 0;display:flex;align-items:center;gap:5px}
  .src .snip{font-size:12.5px;color:var(--muted);margin-top:6px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .src .sim{font-size:11.5px;color:var(--muted);margin-top:5px}
  .badge-tr{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:#0F6E56;background:#E1F5EE;padding:1px 7px;border-radius:5px;margin-left:7px;vertical-align:1px;white-space:nowrap}
  .badge-warn{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:#A32D2D;background:#FCEBEB;padding:1px 7px;border-radius:5px;margin-left:7px;vertical-align:1px;white-space:nowrap}

  .prov{font-size:12px;color:var(--muted);margin-top:18px;padding:11px 14px;background:var(--indigobg);
        border-radius:10px;display:flex;align-items:flex-start;gap:9px}
  .prov b{color:var(--ink2);font-weight:600}
  .err{font-size:12.5px;color:#A32D2D;background:#FCEBEB;border-radius:9px;padding:9px 12px;margin-bottom:10px}
  .none{font-size:13px;color:var(--muted);font-style:italic;padding:6px 0}

  /* deep-mode sub-queries */
  .subq{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:-6px 0 20px}
  .subq-h{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:5px;font-weight:600}
  .subq-chip{font-size:12px;color:var(--ink2);background:var(--indigobg);border-radius:999px;padding:4px 11px}

  /* consensus / disagreement panel */
  .consensus{font-size:13px;margin-top:16px;padding:13px 16px;border-radius:12px}
  .consensus-ok{background:#E1F5EE;color:#0F6E56}
  .consensus-warn{background:#FBF1DE;color:#8A5A12}
  .cons-head{display:flex;align-items:center;gap:8px;font-weight:600;margin-bottom:6px}
  .cons-stat{margin-left:auto;font-weight:500;font-size:12px;opacity:.85}
  .cl{padding:9px 0;border-top:.5px solid rgba(0,0,0,.09)}
  .cl-t{color:var(--ink);font-size:13.5px;margin-bottom:5px}
  .cl-tags{display:flex;flex-wrap:wrap;align-items:center;gap:5px}
  .cl-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:600;opacity:.7}
  .cl-lbl.ok{color:#0F6E56} .cl-lbl.bad{color:#A32D2D}
  .cl-note{margin-top:5px;font-size:12px;color:#A32D2D;display:flex;align-items:flex-start;gap:5px}

  /* report mode — progress + render */
  .rprog{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 22px}
  .rprog-h{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--ink2);font-weight:500}
  .rprog-secs{margin-top:14px;display:flex;flex-direction:column;gap:7px}
  .rsec{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--muted)}
  .rsec-dot{width:9px;height:9px;border-radius:50%;border:2px solid var(--line2);flex:none}
  .rsec.active{color:var(--ink)} .rsec.active .rsec-dot{border-color:var(--indigo);background:var(--indigobg)}
  .rsec.done{color:var(--ink2)} .rsec.done .rsec-dot{border-color:#2BB673;background:#2BB673}
  .rexec-h,.rsec-title{font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:10px}
  .rsec-title{text-transform:none;letter-spacing:0;font-size:16px;font-weight:600;color:var(--ink)}
  .rsection{margin-bottom:16px}
  .rsources{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 20px;margin-top:18px}
  .rsources h3{font-size:13px;font-weight:600;color:var(--ink2);margin:0 0 11px;display:flex;align-items:center;gap:8px}
  .rsrc{font-size:13px;color:var(--ink2);padding:5px 0;line-height:1.5}
  .rsrc-name{color:var(--ink)}
  .rurl{font-size:11.5px;color:var(--muted);word-break:break-all;background:var(--bg);padding:1px 5px;border-radius:5px}
  .eprofile{background:var(--indigobg);border-radius:12px;padding:12px 16px;margin-bottom:16px}
  .ep-h{font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--indigo);font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:7px}
  .ep-rows{display:flex;flex-direction:column;gap:4px}
  .ep-row{font-size:13px;color:var(--ink2)} .ep-row b{color:var(--ink);font-weight:600}
  .ep-dim{color:var(--muted);font-size:12px}

  /* revision history — "how it changed its mind" */
  .rev{background:#E1F5EE;border:1px solid #BFE6D8;border-radius:12px;padding:13px 16px;margin-bottom:18px}
  .rev-h{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;color:#0F6E56;margin-bottom:6px}
  .rev-note{font-size:13px;color:var(--ink2);margin-bottom:8px}
  .rev-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
  .rev-chip{font-size:11.5px;border-radius:999px;padding:2px 9px;white-space:nowrap}
  .rev-add{background:#E1F5EE;color:#0F6E56}
  .rev-rem{background:#FCEBEB;color:#A32D2D}
  .rev-prior{margin-top:4px}
  .rev-prior summary{cursor:pointer;color:#0F6E56;font-weight:500;font-size:12.5px}
  .rev-prior .pa{white-space:pre-wrap;word-wrap:break-word;color:var(--muted);font-size:12.5px;margin-top:8px;
       max-height:260px;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
  .rev-foot{margin-top:8px;font-size:11.5px;color:var(--muted)}
  .rev-foot a{color:var(--muted);text-decoration:underline;cursor:pointer}

  /* favorites — a start-page bookmarks bar, like a browser's */
  .favs{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;margin-top:26px;max-width:680px}
  .fav{position:relative;display:inline-flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);
       border-radius:12px;padding:8px 13px 8px 9px;cursor:pointer;text-decoration:none;color:var(--ink2);font-size:13px;
       max-width:210px;transition:.12s}
  .fav:hover{border-color:var(--indigo);color:var(--indigo)}
  .fav .ic{width:26px;height:26px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;
       color:#fff;font-weight:600;font-size:13px;line-height:1}
  .fav .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fav .x{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;background:var(--ink);color:#fff;
       border:2px solid var(--bg);font-size:12px;line-height:1;display:none;align-items:center;justify-content:center;cursor:pointer}
  .fav:hover .x{display:flex}
  .fav-add{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px dashed var(--line2);border-radius:12px;
       padding:9px 14px;cursor:pointer;color:var(--muted);font-size:13px;line-height:1}
  .fav-add:hover{border-color:var(--indigo);color:var(--indigo)}
  .favform{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;margin-top:14px}
  .favform input{border:1px solid var(--line2);border-radius:9px;padding:8px 11px;font:inherit;font-size:13px;outline:none;color:var(--ink)}
  .favform input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigobg)}
  .favform .fi-url{width:280px;max-width:70vw} .favform .fi-nm{width:150px}
  .favform button{background:var(--indigo);color:#fff;border:none;border-radius:9px;padding:8px 15px;font:inherit;font-weight:500;font-size:13px;cursor:pointer}
  .favform button.cancel{background:var(--line2);color:var(--ink2)}
  .favform .fe{flex-basis:100%;text-align:center;color:#A32D2D;font-size:12px;display:none}
</style>
</head>
<body>

<div class="top" id="top">
  <div class="wrap">
    <span class="brand">Open<span class="lens">Lens</span></span>
    <div class="bar" style="flex:1">
      <span class="mag" id="ti-search2"></span>
      <input id="q2" placeholder="Ask anything — your library + the live web">
      <button class="go" id="go2"><span id="ti-arr2"></span>Ask</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="hero" id="hero">
    <h1>Open<span class="lens">Lens</span></h1>
    <p>Your own library and the live web — synthesized, cited, and private.</p>
    <div class="bar" style="width:100%;max-width:620px">
      <span class="mag" id="ti-search"></span>
      <input id="q" placeholder="Ask anything — e.g. how do vector databases work?" autofocus>
      <button class="go" id="go"><span id="ti-arr"></span>Ask</button>
    </div>
    <div class="opts">
      <span class="opt" data-tog="web"><span class="sw on" id="sw-web"><i></i></span>Web crawlers</span>
      <span class="opt" data-tog="books"><span class="sw on" id="sw-books"><i></i></span>Library</span>
      <span class="opt" data-tog="scholar" title="Also query scholarly literature (OpenAlex / Semantic Scholar / arXiv)"><span class="sw" id="sw-scholar"><i></i></span>Scholar</span>
      <span class="opt" data-tog="report" title="Build a structured, multi-section cited research report (takes a few minutes)"><span class="sw" id="sw-report"><i></i></span>Report</span>
      <span class="opt" data-tog="deep" title="Decompose a complex question into sub-queries and search each"><span class="sw" id="sw-deep"><i></i></span>Deep</span>
      <span class="opt" data-tog="verify" title="Check that every citation actually supports its claim"><span class="sw" id="sw-verify"><i></i></span>Verify</span>
      <span class="opt" data-tog="history" title="Keep a local, opt-in revision history — re-asking a question shows what changed (sources, consensus). Stored on this machine only."><span class="sw" id="sw-history"><i></i></span>History</span>
      <span class="opt" data-tog="translate"><span class="sw" id="sw-translate"><i></i></span>Translate sources</span>
      <span class="num">Web <input id="n-web" type="number" min="0" max="10" value="5"></span>
      <span class="num">Books <input id="n-books" type="number" min="0" max="8" value="4"></span>
    </div>
    <div class="egs" id="egs"></div>
    <div class="favs" id="favs"></div>
    <div class="favform" id="favform" style="display:none">
      <input class="fi-nm" id="fav-nm" placeholder="Name (optional)" maxlength="40" autocomplete="off" spellcheck="false">
      <input class="fi-url" id="fav-url" placeholder="https://example.com" maxlength="2048" autocomplete="off" spellcheck="false">
      <button id="fav-save">Add</button>
      <button class="cancel" id="fav-cancel">Cancel</button>
      <div class="fe" id="fav-err"></div>
    </div>
  </div>

  <div class="results" id="results">
    <div class="qline"><span class="qi" id="ti-q"></span><span id="qtext"></span></div>
    <div id="out"></div>
  </div>
</div>

<script>
const ICONS={
 search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/>',
 arrow:'<path d="M5 12h14M13 6l6 6-6 6"/>',
 q:'<circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4 1.5c0 1.5-2 2-2 3.5M12 17h.01"/>',
 ext:'<path d="M14 4h6v6M20 4l-9 9M18 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h5"/>',
 book:'<path d="M5 4h13a1 1 0 0 1 1 1v15H6a2 2 0 0 1-2-2V4z"/><path d="M19 16H6a2 2 0 0 0-2 2"/>',
 globe:'<circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/>',
 lock:'<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>',
 lang:'<path d="M4 5h7M9 3v2c0 4-2 7-5 9M5 9c0 2 2 4 4 4M12 20l4-9 4 9M15 17h5"/>',
 alert:'<path d="M12 4 2.5 20h19z"/><path d="M12 10v4M12 17h.01"/>',
 sch:'<path d="M12 4 2 9l10 5 10-5-10-5z"/><path d="M6 11v5c0 1 2.7 2 6 2s6-1 6-2v-5"/>',
 plus:'<path d="M12 5v14M5 12h14"/>',
 hist:'<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 4v4h4"/><path d="M12 8v4l3 2"/>'
};
function ico(n,sz){return '<svg viewBox="0 0 24 24"'+(sz?' style="font-size:'+sz+'"':'')+' aria-hidden="true">'+(ICONS[n]||'')+'</svg>';}
const $=s=>document.querySelector(s);
function esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
function domain(u){try{return new URL(u).hostname.replace(/^www\./,'');}catch(e){return u;}}

// place static icons
$('#ti-search').innerHTML=ico('search');$('#ti-search2').innerHTML=ico('search');
$('#ti-arr').innerHTML=ico('arrow');$('#ti-arr2').innerHTML=ico('arrow');
$('#ti-q').innerHTML=ico('q');

const state={web:true,books:true,translate:false,deep:false,verify:false,scholar:false,report:false,history:false};
document.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{const k=o.dataset.tog;state[k]=!state[k];$('#sw-'+k).classList.toggle('on',state[k]);});

const EGS=['How do vector databases work?','What is retrieval-augmented generation?','Explain transformer attention, intuitively','Trade-offs of quantizing a language model','How does HNSW indexing work?'];
$('#egs').innerHTML='';EGS.forEach(e=>{const b=document.createElement('span');b.className='eg';b.textContent=e;b.onclick=()=>{ $('#q').value=e; run(); };$('#egs').appendChild(b);});

function citeify(text){
  // escape first (answer is local-model text, but stay safe), then linkify [B#]/[W#]/[S#] + bold Sources:
  let h=esc(text);
  h=h.replace(/\[(B|W|S)(\d+)\]/g,(m,t,n)=>`<a class="cite cite-${t}" href="#src-${t}${n}" onclick="hl('${t}${n}')">[${t}${n}]</a>`);
  h=h.replace(/^(Sources:)/m,'<span class="srchead">$1</span>');
  return h;
}
window.hl=function(id){const el=document.getElementById('src-'+id);if(!el)return;document.querySelectorAll('.src').forEach(s=>s.classList.remove('hl'));el.classList.add('hl');el.scrollIntoView({behavior:'smooth',block:'center'});};

function srcCard(kind,idx,o){
  const a=document.createElement('a');a.className='src';a.id='src-'+(kind==='w'?'W':'B')+idx;
  if(kind==='w'){a.href=o.url||'#';a.target='_blank';a.rel='noopener noreferrer';
    a.innerHTML=`<span class="id w">W${idx}</span><span class="t"></span><span class="tb"></span><span class="tw"></span>`+
      `<div class="dom">${ico('ext','13px')}<span class="d"></span></div>`+
      `<div class="snip"></div>`;
    a.querySelector('.t').textContent=o.title||o.url||'(untitled)';
    a.querySelector('.d').textContent=domain(o.url||'');
    a.querySelector('.snip').textContent=(o.text&&o.text.slice(0,260))||o.snippet||'';
    if(o.translated){const tb=a.querySelector('.tb');tb.className='tb badge-tr';tb.innerHTML=ico('lang','12px')+' translated from '+esc(o.lang||'?');}
    if(o.suspicious){const tw=a.querySelector('.tw');tw.className='tw badge-warn';tw.innerHTML=ico('alert','12px')+' flagged: possible injection';}
  }else if(kind==='s'){a.id='src-S'+idx;
    if(o.url){a.href=o.url;a.target='_blank';a.rel='noopener noreferrer';}else{a.href='#';a.onclick=e=>e.preventDefault();}
    a.innerHTML=`<span class="id s">S${idx}</span><span class="t"></span><div class="dom">${ico('ext','13px')}<span class="d"></span></div><div class="snip"></div>`;
    a.querySelector('.t').textContent=o.name||'(paper)';
    a.querySelector('.d').textContent=(o.api||'')+(o.doi?(' · doi:'+o.doi):'');
    a.querySelector('.snip').textContent=(o.text&&o.text.slice(0,240))||'';
  }else{a.href='#';a.onclick=e=>e.preventDefault();
    a.innerHTML=`<span class="id b">B${idx}</span><span class="t"></span><div class="sim"></div>`;
    a.querySelector('.t').textContent=o.name||'(library passage)';
    a.querySelector('.sim').textContent='similarity '+(o.score!=null?o.score:'—');
  }
  return a;
}

let busy=false;
async function run(){
  if(busy)return;
  const q=($('#q').value||$('#q2').value||'').trim();
  if(!q)return;
  busy=true;
  $('#q2').value=q;
  $('#hero').style.display='none';$('#top').style.display='block';$('#results').style.display='block';
  document.querySelectorAll('.go').forEach(b=>b.disabled=true);
  $('#qtext').textContent=q;
  const loadMsg=state.report
    ? `<div class="loading"><div class="spin"></div><div><div>Building a structured report…</div><div class="steps">this takes a few minutes — outlining · researching each section · synthesizing locally</div></div></div>`
    : `<div class="loading"><div class="spin"></div><div><div>Searching the web + reading your library…</div><div class="steps">crawling sources · reranking · synthesizing locally</div></div></div>`;
  $('#out').innerHTML=loadMsg;
  try{
    if(state.report){ await reportAsk(q); }
    else { await streamAsk(q); }
  }catch(e){
    if(state.report){
      $('#out').innerHTML=`<div class="err">Couldn't build report: ${esc(e.message||e)}</div>`;
    }else{
      // Graceful fallback to the blocking endpoint if streaming is unavailable.
      try{
        const r=await fetch('/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:askBody(q)});
        const res=await r.json(); if(res.error)throw new Error(res.error);
        renderShell(res); $('#ans-body').innerHTML=citeify(res.answer||'(no answer)'); finalize(res,res);
      }catch(e2){
        $('#out').innerHTML=`<div class="err">Couldn't answer: ${esc(e2.message||e2)}</div>`;
      }
    }
  }
  busy=false;document.querySelectorAll('.go').forEach(b=>b.disabled=false);
}

function askBody(q){return JSON.stringify({q,web:+$('#n-web').value,books:+$('#n-books').value,use_web:state.web,use_books:state.books,translate:state.translate,deep:state.deep,verify:state.verify,scholar:state.scholar,history:state.history});}

// Report mode: stream progress (reports take minutes), then render the structured result.
async function reportAsk(q){
  const r=await fetch('/report_stream',{method:'POST',headers:{'Content-Type':'application/json'},body:askBody(q)});
  if(!r.ok||!r.body)throw new Error('report stream unavailable');
  $('#out').innerHTML=`<div class="rprog"><div class="rprog-h"><div class="spin"></div><span id="rprog-msg">Planning report outline…</span></div><div id="rprog-secs" class="rprog-secs"></div></div>`;
  const msg=$('#rprog-msg'),secsEl=$('#rprog-secs');const secEls={};
  const reader=r.body.getReader(),dec=new TextDecoder();let buf='';
  while(true){
    const {value,done}=await reader.read();
    if(done)break;
    buf+=dec.decode(value,{stream:true});
    let i;
    while((i=buf.indexOf('\n\n'))>=0){
      const raw=buf.slice(0,i);buf=buf.slice(i+2);
      if(!raw.startsWith('data:'))continue;
      let ev;try{ev=JSON.parse(raw.slice(5).trim());}catch(_){continue;}
      if(ev.type==='phase'){ if(msg)msg.textContent=ev.msg; }
      else if(ev.type==='outline'){
        secsEl.innerHTML=ev.sections.map((t,i)=>`<div class="rsec" id="rsec-${i}"><span class="rsec-dot"></span><span>${esc(t)}</span></div>`).join('');
        ev.sections.forEach((t,i)=>secEls[i]=$('#rsec-'+i));
      }
      else if(ev.type==='section'){
        const el=secEls[ev.i-1];
        if(el){el.classList.toggle('active',ev.state==='start');el.classList.toggle('done',ev.state==='done');}
        if(msg)msg.textContent=`Section ${ev.i}/${ev.n}: ${ev.title}`;
      }
      else if(ev.type==='done'){ renderReport(ev.result); }
      else if(ev.type==='error'){ throw new Error(ev.error); }
    }
  }
}

// Structured, escaped render of a report. No raw markdown/HTML is injected — every field
// goes through citeify/esc and untrusted source URLs render as INERT text (no script
// execution + no auto-loaded links in the rendered report).
// Evidence profile — structural MEASURED components, never a rolled-up score.
function profileEl(p){
  const el=document.createElement('div');el.className='eprofile';
  const tiers=Object.entries(p.by_tier||{}).map(([k,v])=>k+':'+v).join(' · ');
  let h=`<div class="ep-h">${ico('book','13px')} Evidence profile</div><div class="ep-rows">`;
  h+=`<div class="ep-row"><b>${p.n_sources||0}</b> sources · ${p.n_trusted||0} trusted · ${p.n_untrusted||0} untrusted${tiers?' &nbsp;<span class="ep-dim">('+esc(tiers)+')</span>':''}</div>`;
  if('n_claims' in p) h+=`<div class="ep-row"><b>${p.n_claims}</b> claims · ${p.n_supported} supported · ${p.n_contested} contested · ${p.n_unsupported} unsupported <span class="ep-dim">(contradiction ${p.contradiction_rate} · completeness ${p.citation_completeness})</span></div>`;
  if(p.years&&p.years.length) h+=`<div class="ep-row ep-dim">recency ${p.years[0]}–${p.years[p.years.length-1]}</div>`;
  el.innerHTML=h+`</div>`;
  return el;
}
function renderReport(res){
  const out=$('#out');out.innerHTML='';
  const hd=document.createElement('div');hd.className='answer';
  hd.innerHTML=`<div class="lbl"><span class="dot"></span>Report · synthesized locally · ${esc(res.model||'')}</div>`+
    `<div class="rexec-h">Executive summary</div><div class="body" id="rexec"></div>`;
  hd.querySelector('#rexec').innerHTML=citeify(res.exec_summary||'');
  out.appendChild(hd);
  if(res.profile) out.appendChild(profileEl(res.profile));
  (res.sections||[]).forEach((s,i)=>{
    const sec=document.createElement('div');sec.className='answer rsection';
    sec.innerHTML=`<div class="rsec-title">${i+1}. ${esc(s.title||'')}</div><div class="body"></div>`;
    sec.querySelector('.body').innerHTML=citeify(s.text||'');
    out.appendChild(sec);
  });
  if(res.sources&&res.sources.length){
    const ss=document.createElement('div');ss.className='rsources';
    ss.innerHTML=`<h3>${ico('book')} Sources</h3>`;
    res.sources.forEach(s=>{
      const k=(String(s.tag)[0]||'B');
      const row=document.createElement('div');row.className='rsrc';
      let extra='';
      if(s.untrusted){extra=`<span class="badge-warn">${ico('alert','11px')} untrusted</span>`+(s.url?` <span class="rurl">${esc(s.url)}</span>`:'');}
      else if(k==='S'&&s.url){extra=`<span class="rurl">${esc(s.url)}</span>`;}
      row.innerHTML=`<span class="cite cite-${k}">[${esc(s.tag)}]</span> <span class="rsrc-name">${esc(s.name||'')}</span> ${extra}`;
      ss.appendChild(row);
    });
    out.appendChild(ss);
  }
  if(res.consensus) renderVerify(res.consensus);
  const prov=document.createElement('div');prov.className='prov';
  prov.innerHTML=`${ico('lock')}<div><b>Saved locally</b> (with a SHA-256 sidecar): <span class="rurl">${esc(res.path||'')}</span>. Private by design — only keyword queries left the machine.</div>`;
  out.appendChild(prov);
  window.scrollTo({top:0,behavior:'smooth'});
}

async function streamAsk(q){
  const r=await fetch('/ask_stream',{method:'POST',headers:{'Content-Type':'application/json'},body:askBody(q)});
  if(!r.ok||!r.body)throw new Error('stream unavailable');
  const reader=r.body.getReader(),dec=new TextDecoder();
  let buf='',answer='',meta=null,bodyEl=null;
  while(true){
    const {value,done}=await reader.read();
    if(done)break;
    buf+=dec.decode(value,{stream:true});
    let i;
    while((i=buf.indexOf('\n\n'))>=0){
      const raw=buf.slice(0,i);buf=buf.slice(i+2);
      if(!raw.startsWith('data:'))continue;
      let ev;try{ev=JSON.parse(raw.slice(5).trim());}catch(_){continue;}
      if(ev.type==='meta'){meta=ev;renderShell(ev);bodyEl=$('#ans-body');}
      else if(ev.type==='token'){answer+=ev.t;if(bodyEl)bodyEl.innerHTML=citeify(answer)+'<span class="cursor"></span>';}
      else if(ev.type==='done'){answer=ev.answer||answer;if(bodyEl)bodyEl.innerHTML=citeify(answer);finalize(meta||{},ev);}
      else if(ev.type==='verify'){renderVerify(ev.verification);}
      else if(ev.type==='revision'){renderRevision(ev.revision);}
      else if(ev.type==='error'){throw new Error(ev.error);}
    }
  }
}

// Build the answer skeleton + source columns + provenance. Answer body fills as tokens stream.
function renderShell(meta){
  const out=$('#out');out.innerHTML='';
  const ans=document.createElement('div');ans.className='answer';
  const rr=meta.reranked?' · reranked':'';
  ans.innerHTML=`<div class="lbl"><span class="dot"></span><span id="ans-lbl">Synthesizing locally · ${esc(meta.model||'')}${rr}</span></div><div class="body" id="ans-body"></div>`;
  out.appendChild(ans);

  // Deep mode: show the sub-queries the planner explored.
  if(meta.subqueries&&meta.subqueries.length){
    const sq=document.createElement('div');sq.className='subq';
    sq.innerHTML=`<span class="subq-h">${ico('q','13px')} Explored ${meta.subqueries.length} angles:</span>`+
      meta.subqueries.map(s=>`<span class="subq-chip">${esc(s)}</span>`).join('');
    out.appendChild(sq);
  }

  // Scholarly literature — peer-reviewed [S#] tier, surfaced prominently.
  if(meta.schols&&meta.schols.length){
    const ssec=document.createElement('div');ssec.className='sec schsec';
    ssec.innerHTML=`<h3>${ico('sch')} Scholarly literature <span class="tag sch">peer-reviewed</span></h3>`;
    meta.schols.forEach((s,i)=>ssec.appendChild(srcCard('s',i+1,s)));
    out.appendChild(ssec);
  }

  const cols=document.createElement('div');cols.className='seccol';
  const wsec=document.createElement('div');wsec.className='sec';
  wsec.innerHTML=`<h3>${ico('globe')} From the web <span class="tag web">crawlers</span></h3>`;
  if(meta.web_err){const d=document.createElement('div');d.className='err';d.textContent=meta.web_err;wsec.appendChild(d);}
  if(meta.webs&&meta.webs.length){meta.webs.forEach((w,i)=>wsec.appendChild(srcCard('w',i+1,w)));}
  else if(!meta.web_err){const d=document.createElement('div');d.className='none';d.textContent=meta.web_query?('No web results for "'+meta.web_query+'"'):'Web search off.';wsec.appendChild(d);}
  const bsec=document.createElement('div');bsec.className='sec';
  bsec.innerHTML=`<h3>${ico('book')} From your library <span class="tag book">your documents</span></h3>`;
  if(meta.book_err){const d=document.createElement('div');d.className='err';d.textContent=meta.book_err;bsec.appendChild(d);}
  if(meta.books&&meta.books.length){meta.books.forEach((b,i)=>bsec.appendChild(srcCard('b',i+1,b)));}
  else if(!meta.book_err){const d=document.createElement('div');d.className='none';d.textContent='Library off or empty.';bsec.appendChild(d);}
  cols.appendChild(wsec);cols.appendChild(bsec);out.appendChild(cols);

  const prov=document.createElement('div');prov.className='prov';
  prov.innerHTML=`${ico('lock')}<div><b>Private by design.</b> Only the keyword query left this machine${meta.web_query?(': <b>“'+esc(meta.web_query)+'”</b>'):''}. Your question, the retrieved passages, and this answer never left — synthesized by a local model.</div>`;
  out.appendChild(prov);
  window.scrollTo({top:0,behavior:'smooth'});
}

// Flip the label and add the citation-integrity banner once the answer is complete.
function finalize(meta,doneEv){
  const lbl=$('#ans-lbl');if(lbl)lbl.textContent=`Synthesized locally · ${esc((meta&&meta.model)||doneEv.model||'')}`+(meta&&meta.reranked?' · reranked':'');
  const warn=doneEv.citation_warning;
  if(warn&&warn.length){
    const cw=document.createElement('div');cw.className='prov';cw.style.background='#FCEBEB';
    cw.innerHTML=`${ico('alert')}<div><b style="color:#A32D2D">Citation check —</b> the answer referenced ${esc(warn.join(', '))}, source tag(s) that weren't provided. Treat those claims with suspicion.</div>`;
    $('#out').appendChild(cw);
  }
  if(doneEv.verification)renderVerify(doneEv.verification);   // blocking-fallback path
  if(doneEv.revision)renderRevision(doneEv.revision);          // blocking-fallback path
}

// Revision history — "how it changed its mind." Shown above the answer when you've asked this
// question before. The note + diffs are deterministic + structural (server-side) — never a model story.
function renderRevision(rev){
  if(!rev)return;
  const el=document.createElement('div');el.className='rev';
  let chips='';
  (rev.added||[]).forEach(l=>chips+=`<span class="rev-chip rev-add">+ ${esc(l)}</span>`);
  (rev.removed||[]).forEach(l=>chips+=`<span class="rev-chip rev-rem">− ${esc(l)}</span>`);
  let cons='';
  if(rev.consensus_before&&rev.consensus_after){
    const b=rev.consensus_before,a=rev.consensus_after;
    cons=`<div class="rev-note">Consensus: ${b.n_contested}→${a.n_contested} contested · ${b.n_unsupported}→${a.n_unsupported} unsupported</div>`;
  }
  const hasPrior=!!(rev.prior_answer&&rev.prior_answer.length);
  el.innerHTML=`<div class="rev-h">${ico('hist','15px')} How this changed since you last asked</div>`+
    `<div class="rev-note">${esc(rev.note)}</div>`+
    (chips?`<div class="rev-chips">${chips}</div>`:'')+cons+
    (hasPrior?`<details class="rev-prior"><summary>View the answer from ${esc(rev.prior_when)}</summary><div class="pa"></div></details>`:'')+
    `<div class="rev-foot">Revision history is local to this machine. <a id="rev-clear">Clear it</a>.</div>`;
  if(hasPrior)el.querySelector('.pa').textContent=rev.prior_answer;   // prior answer as inert text (no XSS)
  el.querySelector('#rev-clear').onclick=async()=>{try{await fetch('/history/clear',{method:'POST'});}catch(e){}el.remove();};
  const out=$('#out');out.insertBefore(el,out.firstChild);
}

// Disagreement engine: per-claim, which sources support vs contradict, and where
// they disagree. Green when nothing is contested/unsupported; amber otherwise.
function citeTag(t){const k=(String(t)[0]||'B').toUpperCase();return `<a class="cite cite-${k}" href="#src-${esc(t)}" onclick="hl('${esc(t)}')">[${esc(t)}]</a>`;}
function renderVerify(v){
  if(!v||!v.claims)return;
  const contested=v.n_contested||0, unsup=v.n_unsupported||0, warn=(contested||unsup);
  const el=document.createElement('div');el.className='consensus '+(warn?'consensus-warn':'consensus-ok');
  let rows='';
  v.claims.forEach(c=>{
    const sup=(c.supporting||[]).map(citeTag).join(' ');
    const con=(c.contradicting||[]).map(citeTag).join(' ');
    rows+=`<div class="cl"><div class="cl-t">${esc(c.claim)}</div><div class="cl-tags">`+
      (sup?`<span class="cl-lbl ok">supports</span>${sup}`:`<span class="cl-lbl bad">no source supports this</span>`)+
      (con?` &nbsp;<span class="cl-lbl bad">contradicts</span>${con}`:'')+`</div>`+
      (c.note?`<div class="cl-note">${ico('alert','12px')} ${esc(c.note)}</div>`:'')+`</div>`;
  });
  el.innerHTML=`<div class="cons-head">${warn?ico('alert'):ico('lock')}<b>Consensus check</b>`+
    `<span class="cons-stat">${v.n_claims} claim${v.n_claims==1?'':'s'} · ${contested} contested · ${unsup} unsupported</span></div>`+rows;
  $('#out').appendChild(el);
}

// ---- Favorites: a start-page bookmarks bar, like a browser's. Persisted SERVER-SIDE in a
// local file (under %LOCALAPPDATA%/gainsay/favorites.json) so they survive a browser cache-clear
// and show in every browser on this machine — and still never leave the box (127.0.0.1 only).
// Letter tiles, not remote favicons, so the bookmark list never pings a favicon service.
// http/https only — enforced on BOTH client and server. ----
const FAV_KEY='lens.favorites';                 // legacy localStorage (migrated to server, then cleared)
const FAV_MIGRATED='lens.favorites.migrated';
const FAV_COLORS=['#4F46E5','#1D6FB8','#0F6E56','#6D3BB5','#9A6B1E','#0E7490','#B5306B','#2B7A3D'];
let FAV_CACHE=[];
function favColor(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return FAV_COLORS[h%FAV_COLORS.length];}
function favNormalize(raw){                       // client pre-check; the server re-validates
  let u=(raw||'').trim();if(!u)return null;
  if(!/^[a-z][a-z0-9+.\-]*:/i.test(u))u='https://'+u;
  let p;try{p=new URL(u);}catch(e){return null;}
  return (p.protocol==='http:'||p.protocol==='https:')?p.href:null;
}
async function favGet(){try{const r=await fetch('/favorites');if(!r.ok)return[];const d=await r.json();return Array.isArray(d.favorites)?d.favorites:[];}catch(e){return[];}}
async function favPut(list){try{const r=await fetch('/favorites',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({favorites:list})});if(!r.ok)return list;const d=await r.json();return Array.isArray(d.favorites)?d.favorites:list;}catch(e){return list;}}
function favRender(){
  const wrap=$('#favs');if(!wrap)return;wrap.innerHTML='';
  FAV_CACHE.forEach((f,idx)=>{
    const a=document.createElement('a');a.className='fav';a.href=f.url;a.rel='noreferrer noopener';a.title=f.url;
    const ic=document.createElement('span');ic.className='ic';ic.style.background=favColor(domain(f.url));
    ic.textContent=((f.name||domain(f.url)||'?').trim().charAt(0)||'?').toUpperCase();
    const nm=document.createElement('span');nm.className='nm';nm.textContent=f.name||domain(f.url);
    const x=document.createElement('span');x.className='x';x.textContent='×';x.title='Remove';
    x.onclick=e=>{e.preventDefault();e.stopPropagation();favRemove(idx);};
    a.append(ic,nm,x);wrap.appendChild(a);
  });
  const add=document.createElement('span');add.className='fav-add';add.innerHTML=ico('plus','15px')+'<span>Add</span>';
  add.onclick=()=>{$('#favform').style.display='flex';$('#fav-err').style.display='none';$('#fav-nm').value='';$('#fav-url').value='';$('#fav-url').focus();};
  wrap.appendChild(add);
}
async function favRemove(idx){FAV_CACHE.splice(idx,1);favRender();FAV_CACHE=await favPut(FAV_CACHE);favRender();}
async function favAdd(){
  const url=favNormalize($('#fav-url').value);
  if(!url){const e=$('#fav-err');e.textContent='Enter a valid http(s) web address.';e.style.display='block';return;}
  const name=($('#fav-nm').value||'').trim().slice(0,40)||domain(url);
  FAV_CACHE.push({name,url});$('#favform').style.display='none';favRender();
  FAV_CACHE=await favPut(FAV_CACHE);favRender();
}
$('#fav-save').onclick=favAdd;
$('#fav-cancel').onclick=()=>{$('#favform').style.display='none';};
$('#fav-url').addEventListener('keydown',e=>{if(e.key==='Enter')favAdd();else if(e.key==='Escape')$('#favform').style.display='none';});
$('#fav-nm').addEventListener('keydown',e=>{if(e.key==='Enter')$('#fav-url').focus();});
(async function favInit(){
  let server=await favGet();
  if(!localStorage.getItem(FAV_MIGRATED)){          // one-time: lift any old localStorage favorites up to the server
    let local=[];try{local=JSON.parse(localStorage.getItem(FAV_KEY)||'[]');}catch(e){}
    if(Array.isArray(local)&&local.length){
      const seen=new Set(server.map(f=>f.url));
      local.forEach(f=>{if(f&&f.url&&!seen.has(f.url)){server.push({name:f.name,url:f.url});seen.add(f.url);}});
      server=await favPut(server);
    }
    try{localStorage.setItem(FAV_MIGRATED,'1');localStorage.removeItem(FAV_KEY);}catch(e){}
  }
  FAV_CACHE=server;favRender();
})();

$('#go').onclick=run;$('#go2').onclick=run;
$('#q').addEventListener('keydown',e=>{if(e.key==='Enter')run();});
$('#q2').addEventListener('keydown',e=>{if(e.key==='Enter'){$('#q').value=$('#q2').value;run();}});
</script>
